<!DOCTYPE html>
<html>
<head>
    <title>Inline, Internal and External CSS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        h2 {
            color: blue;
        }
    </style>
</head>
<body>
    <h1 style="color: red;">This is Inline CSS</h1>
    <h2>This is Internal CSS</h2>
    <p>This paragraph uses External CSS.</p>
</body>
</html>
